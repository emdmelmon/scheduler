<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scheduler Platform</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f7fb;
    margin:0;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    color:#2563eb;
}

.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

input{
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.event{
    margin-top:15px;
    padding:15px;
    background:#eef4ff;
    border-radius:10px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.delete{
    background:#dc2626;
}

.delete:hover{
    background:#b91c1c;
}

</style>

</head>

<body>

<div class="container">

<h1>📅 Personal Scheduler</h1>

<div class="controls">

<input
id="title"
placeholder="Schedule title">

<input
id="date"
type="date">

<button onclick="addTask()">
Add Schedule
</button>

</div>

<div id="scheduleList"></div>

</div>

<script>

let schedules = [];

function addTask(){

const title =
document.getElementById("title").value;

const date =
document.getElementById("date").value;

if(title==="" || date===""){
    alert("Please enter schedule and date.");
    return;
}

schedules.push({
    title:title,
    date:date
});

render();

document.getElementById("title").value="";
document.getElementById("date").value="";

}

function render(){

const list =
document.getElementById("scheduleList");

list.innerHTML="";

schedules.forEach((item,index)=>{

list.innerHTML += `

<div class="event">

<div>

<strong>${item.title}</strong>

<br>

${item.date}

</div>

<button
class="delete"
onclick="removeTask(${index})">

Delete

</button>

</div>

`;

});

}

function removeTask(index){

schedules.splice(index,1);

render();

}

</script>

</body>
</html>
